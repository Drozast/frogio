<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="frog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle inner shadow -->
  <rect x="8" y="8" width="496" height="496" rx="100" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Frog face - main head -->
  <ellipse cx="256" cy="280" rx="120" ry="100" fill="url(#frog)" opacity="0.95"/>
  <!-- Left eye bump -->
  <circle cx="196" cy="195" r="52" fill="url(#frog)" opacity="0.95"/>
  <!-- Right eye bump -->
  <circle cx="316" cy="195" r="52" fill="url(#frog)" opacity="0.95"/>
  <!-- Left eye -->
  <circle cx="196" cy="195" r="30" fill="#1B5E20"/>
  <circle cx="202" cy="189" r="14" fill="#2E7D32"/>
  <circle cx="206" cy="185" r="7" fill="#FFFFFF"/>
  <!-- Right eye -->
  <circle cx="316" cy="195" r="30" fill="#1B5E20"/>
  <circle cx="322" cy="189" r="14" fill="#2E7D32"/>
  <circle cx="326" cy="185" r="7" fill="#FFFFFF"/>
  <!-- Smile -->
  <path d="M200 300 Q230 340 256 340 Q282 340 312 300" stroke="#1B5E20" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Nostrils -->
  <circle cx="238" cy="272" r="5" fill="#1B5E20" opacity="0.4"/>
  <circle cx="274" cy="272" r="5" fill="#1B5E20" opacity="0.4"/>
  <!-- Text "F" watermark -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="rgba(255,255,255,0.25)" letter-spacing="8">FROGIO</text>
</svg>
